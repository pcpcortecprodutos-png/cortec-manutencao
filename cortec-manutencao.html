/* ── Email ───────────────────────────────────────────────────────────────── */
async function enviarEmail(dest, nome, assunto, msg) {
  if (!EMAIL_CONFIG.ativo) { console.log("[EMAIL] Para:", dest, "| Assunto:", assunto); return; }
  try {
    await emailjs.send(EMAIL_CONFIG.serviceId, EMAIL_CONFIG.templateId,
      { to_email:dest, to_name:nome, subject:assunto, message:msg, from_name:"CORTEC Manutenção" },
      EMAIL_CONFIG.publicKey);
  } catch(e) { console.warn("EmailJS:", e); }
}
async function notificarNovo(tk, users) {
  const op = users.find(u=>u.id===tk.operatorId);
  const ld = users.find(u=>u.id===tk.leaderId);
  const msg = `Novo chamado registrado.\n\nChamado: ${tk.id}\nMáquina: ${tk.machine}\nPrioridade: ${PRIO[tk.priority]?.label}\nOperador: ${tk.operatorName}\nAbertura: ${fmtD(tk.openedAt)}\n\nDescrição:\n${tk.description}`;
  if (ld?.email) await enviarEmail(ld.email, ld.name, `[CORTEC] Novo Chamado: ${tk.machine}`, msg);
  if (op?.email) await enviarEmail(op.email, op.name, `[CORTEC] Chamado ${tk.id} registrado`, `Seu chamado foi aberto com sucesso!\n\nChamado: ${tk.id}\nMáquina: ${tk.machine}\nLíder notificado: ${tk.leaderName}`);
}
async function notificarStatus(tk, ns, por, users) {
  const op = users.find(u=>u.id===tk.operatorId);
  const ld = users.find(u=>u.id===tk.leaderId);
  const msg = `Status atualizado.\n\nChamado: ${tk.id}\nMáquina: ${tk.machine}\nNovo Status: ${STATUS[ns]?.label}\nAtualizado por: ${por}\nData: ${fmtD(new Date().toISOString())}`;
  const subj = `[CORTEC] Chamado ${tk.id} → ${STATUS[ns]?.label}`;
  if (op?.email) await enviarEmail(op.email, op.name, subj, msg);
  if (ld?.email && ld.id !== op?.id) await enviarEmail(ld.email, ld.name, subj, msg);
}

/* ── Trocar Senha ─────────────────────────────────────────────────────── */
function TrocarSenha({onSave}) {
  const [p1,setP1] = useState(""); const [p2,setP2] = useState(""); const [err,setErr] = useState("");
  const ok = () => { if(p1.length<6) return setErr("Mínimo 6 caracteres."); if(p1!==p2) return setErr("Senhas não conferem."); onSave(p1); };
  return (
    <div style={{minHeight:"100vh",background:"#0d1117",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <Card style={{padding:28,maxWidth:400,width:"100%"}}>
        <h2 style={{fontFamily:"'Rajdhani'",fontWeight:700,fontSize:20,color:"#f59e0b",marginBottom:8}}>PRIMEIRO ACESSO</h2>
        <p style={{fontSize:13,color:"#8b949e",marginBottom:22}}>Defina uma nova senha para continuar.</p>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <Inp label="NOVA SENHA" type="password" value={p1} onChange={e=>setP1(e.target.value)}/>
          <Inp label="CONFIRMAR SENHA" type="password" value={p2} onChange={e=>setP2(e.target.value)} onKeyDown={e=>e.key==="Enter"&&ok()}/>
          {err && <p style={{fontSize:12,color:"#ef4444"}}>{err}</p>}
          <Btn onClick={ok} full>SALVAR E CONTINUAR</Btn>
        </div>
      </Card>
    </div>
  );
}

/* ── Sidebar ──────────────────────────────────────────────────────────── */
const NAV = [
  {id:"dashboard",label:"Dashboard",   icon:"📊",perm:"viewDash"},
  {id:"newTicket",label:"Novo Chamado",icon:"➕",perm:"openTickets"},
  {id:"tickets",  label:"Chamados",    icon:"🔧",perm:null},
  {id:"reports",  label:"Relatórios",  icon:"📋",perm:"viewReports"},
  {id:"users",    label:"Usuários",    icon:"👥",perm:"manageUsers"},
];

function Sidebar({cu, view, go, logout, open, can}) {
  return (
    <aside style={{position:"fixed",top:0,left:open?0:-230,width:220,height:"100vh",background:"#0d1117",borderRight:"1px solid #21262d",display:"flex",flexDirection:"column",zIndex:100,transition:"left .25s"}}>
      <div style={{padding:"18px 16px 14px",borderBottom:"1px solid #21262d"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:34,height:34,background:"#f59e0b18",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>⚙</div>
          <div>
            <div style={{fontFamily:"'Rajdhani'",fontWeight:700,fontSize:15,color:"#e6edf3",letterSpacing:.5}}>CORTEC AÇOS</div>
            <div style={{fontSize:9,color:"#8b949e",letterSpacing:.5}}>MANUTENÇÃO</div>
          </div>
        </div>
      </div>
      <nav style={{flex:1,padding:"10px 8px",display:"flex",flexDirection:"column",gap:2,overflowY:"auto"}}>
        {NAV.filter(n=>!n.perm||can(n.perm)).map(n=>(
          <button key={n.id} onClick={()=>go(n.id)}
            style={{display:"flex",alignItems:"center",gap:10,padding:"9px 10px",borderRadius:7,border:"none",background:view===n.id?"#f59e0b18":"transparent",color:view===n.id?"#f59e0b":"#8b949e",fontSize:13,fontWeight:view===n.id?600:400,cursor:"pointer",transition:"all .15s",textAlign:"left",borderLeft:view===n.id?"2px solid #f59e0b":"2px solid transparent"}}>
            <span style={{fontSize:14}}>{n.icon}</span>{n.label}
          </button>
        ))}
      </nav>
      <div style={{padding:"12px 8px",borderTop:"1px solid #21262d"}}>
        <div style={{padding:"9px 10px",borderRadius:7,background:"#161b22",marginBottom:8}}>
          <p style={{fontSize:12,fontWeight:600,color:"#e6edf3",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{cu.name}</p>
          <p style={{fontSize:10,color:"#8b949e",marginTop:2}}>{ROLES[cu.role]}</p>
        </div>
        <button onClick={logout} style={{width:"100%",padding:"7px 10px",borderRadius:7,border:"1px solid #30363d",background:"transparent",color:"#8b949e",fontSize:12,fontFamily:"'Rajdhani'",cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
          🚪 Sair
        </button>
      </div>
    </aside>
  );
}

/* ── Header ───────────────────────────────────────────────────────────── */
function Header({cu, toggle, nb}) {
  const [now,setNow] = useState(new Date().toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}));
  useEffect(()=>{ const iv=setInterval(()=>setNow(new Date().toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})),30000); return()=>clearInterval(iv); },[]);
  const ini = cu.name.split(" ").map(w=>w[0]).slice(0,2).join("");
  return (
    <header style={{height:54,background:"#0d1117",borderBottom:"1px solid #21262d",display:"flex",alignItems:"center",padding:"0 18px",gap:12,position:"sticky",top:0,zIndex:50}}>
      <button onClick={toggle} style={{background:"none",border:"none",color:"#8b949e",fontSize:20,cursor:"pointer",padding:4}}>☰</button>
      <div style={{flex:1}}/>
      <span style={{fontSize:11,color:"#484f58",fontFamily:"'JetBrains Mono'"}}>{now}</span>
      {nb>0 && <div style={{position:"relative"}}><span style={{fontSize:18}}>🔔</span><span style={{position:"absolute",top:-4,right:-4,background:"#ef4444",color:"#fff",fontSize:9,width:14,height:14,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{nb}</span></div>}
      <div style={{width:32,height:32,borderRadius:"50%",background:RC[cu.role]+"30",border:`1.5px solid ${RC[cu.role]}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:RC[cu.role]}}>{ini}</div>
    </header>
  );
}

/* ── Dashboard ────────────────────────────────────────────────────────── */
function Dashboard({tickets}) {
  const open=tickets.filter(t=>t.status==="open").length;
  const inp =tickets.filter(t=>t.status==="in_progress").length;
  const done=tickets.filter(t=>t.status==="done").length;
  const crit=tickets.filter(t=>t.priority==="critical").length;
  const total=tickets.length||1;
  const recent=[...tickets].sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt)).slice(0,6);
  const KPI=({label,value,color,icon})=>(
    <Card style={{display:"flex",alignItems:"center",gap:14}}>
      <div style={{width:46,height:46,borderRadius:10,background:color+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{icon}</div>
      <div>

/* ── Novo Chamado ─────────────────────────────────────────────────────── */
function NovoChamado({cu, users, onSubmit}) {
  const leaders = users.filter(u=>["leader","admin","management"].includes(u.role));
  const [form,setForm] = useState({machine:"",description:"",leaderId:"",priority:"medium"});
  const [err,setErr] = useState(""); const [loading,setLoading] = useState(false);
  const set = k => e => setForm(f=>({...f,[k]:e.target.value}));
  const submit = async () => {
    if (!form.machine.trim())     return setErr("Informe a máquina.");
    if (!form.description.trim()) return setErr("Informe a descrição.");
    if (!form.leaderId)           return setErr("Selecione um líder.");
    const ld = users.find(u=>u.id===form.leaderId);
    const tk = {...form,id:tid(),operatorId:cu.id,operatorName:cu.name,leaderId:ld.id,leaderName:ld.name,status:"open",openedAt:new Date().toISOString(),updatedAt:new Date().toISOString(),history:[{text:"Chamado aberto",by:cu.name,at:new Date().toISOString()}]};
    setLoading(true); await notificarNovo(tk, users); setLoading(false);
    onSubmit(tk);
  };
  return (
    <div className="anim-in" style={{padding:"22px 18px",maxWidth:640}}>
      <h2 style={{fontFamily:"'Rajdhani'",fontWeight:700,fontSize:22,color:"#e6edf3",marginBottom:18,letterSpacing:.5}}>NOVO CHAMADO</h2>
      <Card>
        <div style={{display:"flex",flexDirection:"column",gap:15}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <Inp label="MÁQUINA *" value={form.machine} onChange={set("machine")} placeholder="Ex: Torno CNC-01"/>
            <Inp label="PRIORIDADE *" select value={form.priority} onChange={set("priority")}>
              {Object.entries(PRIO).map(([k,{label}])=><option key={k} value={k}>{label}</option>)}
            </Inp>
          </div>
          <Inp label="DESCRIÇÃO DO CHAMADO *" textarea value={form.description} onChange={set("description")} placeholder="Descreva detalhadamente o problema observado..."/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <Inp label="OPERADOR" value={cu.name} disabled/>
            <Inp label="LÍDER / GESTOR *" select value={form.leaderId} onChange={set("leaderId")}>
              <option value="">— Selecionar —</option>
              {leaders.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
            </Inp>
          </div>
          <Inp label="DATA DE ABERTURA (automático)" value={new Date().toLocaleString("pt-BR")} disabled/>
          {err && <div style={{fontSize:12,color:"#ef4444",background:"#ef444412",padding:"8px 12px",borderRadius:6}}>⚠ {err}</div>}
          <div style={{display:"flex",gap:10,alignItems:"center",marginTop:4}}>
            <Btn onClick={submit} disabled={loading}>{loading?"📧 Enviando notificações...":"ABRIR CHAMADO"}</Btn>
            <Btn variant="secondary" onClick={()=>setForm({machine:"",description:"",leaderId:"",priority:"medium"})}>LIMPAR</Btn>
          </div>
          <p style={{fontSize:11,color:"#484f58"}}>📧 Ao abrir, o líder e o operador recebem notificação por e-mail automaticamente.</p>
        </div>
      </Card>
    </div>
  );
}

/* ── Relatórios ───────────────────────────────────────────────────────── */
function Relatorios({tickets}) {
  const byM = tickets.reduce((a,t)=>{a[t.machine]=(a[t.machine]||0)+1;return a},{});
  const sorted = Object.entries(byM).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const mx = sorted[0]?.[1]||1;
  const avgH = () => {
    const done=tickets.filter(t=>t.status==="done");
    if (!done.length) return "—";
    const avg=done.reduce((s,t)=>s+(new Date(t.updatedAt)-new Date(t.openedAt)),0)/done.length;
    const h=Math.round(avg/3600000);
    return h<24?`${h}h`:`${Math.round(h/24)}d`;
  };
  return (
    <div className="anim-in" style={{padding:"22px 18px",maxWidth:800}}>
      <h2 style={{fontFamily:"'Rajdhani'",fontWeight:700,fontSize:22,color:"#e6edf3",marginBottom:18,letterSpacing:.5}}>RELATÓRIOS</h2>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:20}}>
        {[["Total",tickets.length,"#e6edf3"],["Concluídos",tickets.filter(t=>t.status==="done").length,"#10b981"],["Abertos",tickets.filter(t=>t.status==="open").length,"#f59e0b"],["Tempo Médio",avgH(),"#3b82f6"]].map(([l,v,c])=>(
          <Card key={l} style={{padding:"13px 16px"}}><p style={{fontSize:10,color:"#8b949e",letterSpacing:.5}}>{l}</p><p style={{fontFamily:"'JetBrains Mono'",fontSize:26,fontWeight:500,color:c,marginTop:6}}>{v}</p></Card>
        ))}
      </div>
      <Card>
        <p style={{fontFamily:"'Rajdhani'",fontWeight:600,fontSize:13,color:"#8b949e",letterSpacing:.5,marginBottom:16}}>CHAMADOS POR MÁQUINA</p>
        {sorted.map(([m,cnt])=>(
          <div key={m} style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
            <span style={{fontSize:12,color:"#c9d1d9",width:175,flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m}</span>
            <div style={{flex:1,background:"#21262d",borderRadius:3,height:8}}><div style={{width:`${Math.round(cnt/mx*100)}%`,background:"#f59e0b",height:"100%",borderRadius:3,transition:"width .5s"}}/></div>
            <span style={{fontFamily:"'JetBrains Mono'",fontSize:12,color:"#f59e0b",width:18,textAlign:"right"}}>{cnt}</span>
          </div>
        ))}
      </Card>
    </div>
  );
}

/* ── Toasts ───────────────────────────────────────────────────────────── */
function Toasts({items}) {
  return (
    <div style={{position:"fixed",bottom:20,right:20,zIndex:300,display:"flex",flexDirection:"column",gap:8,alignItems:"flex-end",pointerEvents:"none"}}>
      {items.map(n=>(
        <div key={n.id} style={{background:n.type==="success"?"#10b981":n.type==="error"?"#ef4444":"#3b82f6",color:"#fff",padding:"10px 16px",borderRadius:8,fontSize:13,fontWeight:500,maxWidth:320,animation:"slideIn .3s ease both",boxShadow:"0 4px 20px rgba(0,0,0,.4)"}}>{n.msg}</div>
      ))}
    </div>
  );
}

/* ══ APP ROOT ════════════════════════════════════════════════════════════ */
function App() {
  const [users,   setUsers]   = useState(() => LS.load("users",   USERS0));
  const [tickets, setTickets] = useState(() => LS.load("tickets", TICKS0));
  const [cu,      setCu]      = useState(() => {
    const saved = LS.load("session", null);
    if (!saved) return null;
    const users0 = LS.load("users", USERS0);
    return users0.find(u => u.id === saved) || null;
  });
  const [view,    setView]    = useState(() => {
    const saved = LS.load("session", null);
    const users0 = LS.load("users", USERS0);
    const u = saved ? users0.find(x => x.id === saved) : null;
    if (!u) return "login";
    if (u.firstLogin) return "troca";
    return u.permissions.viewDash || u.role==="admin" ? "dashboard" : u.permissions.openTickets ? "newTicket" : "tickets";
  });
  const [sb,      setSb]      = useState(window.innerWidth >= 768);
  const [toasts,  setToasts]  = useState([]);
  const [detail,  setDetail]  = useState(null);

  // Auto-salvar sempre que usuários ou tickets mudarem
  useEffect(() => { LS.save("users",   users);   }, [users]);
  useEffect(() => { LS.save("tickets", tickets); }, [tickets]);

  useEffect(()=>{
    if (!cu) return;
    const iv = setInterval(()=>{
      setTickets(prev=>{
        const open=prev.filter(t=>t.status==="open");
        if (!open.length) return prev;
        const tk=open[Math.floor(Math.random()*open.length)];
        toast(`⚙ Chamado ${tk.id} entrou em atendimento`,"info");
        return prev.map(t=>t.id===tk.id?{...t,status:"in_progress",updatedAt:new Date().toISOString(),history:[...t.history,{text:"Atendimento iniciado",by:"Sistema",at:new Date().toISOString()}]}:t);
      });
    }, 30000);
    return ()=>clearInterval(iv);
  },[cu]);

  const toast = useCallback((msg,type="info")=>{
    const id=Date.now();
    setToasts(p=>[...p.slice(-3),{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(n=>n.id!==id)),4500);
  },[]);

  const can = p => cu?.permissions?.[p] || cu?.role==="admin";

  const login = (username, password) => {
    const found = users.find(u=>u.username===username&&u.password===password);
    if (!found) return false;
    setCu(found);
    LS.save("session", found.id); // salva sessão
    if (found.firstLogin) { setView("troca"); return true; }
    const dest = found.permissions.viewDash||found.role==="admin" ? "dashboard" : found.permissions.openTickets ? "newTicket" : "tickets";
    setView(dest);
    toast(`Bem-vindo, ${found.name}!`, "success");
    return true;
  };

  const logout = () => { setCu(null); LS.save("session", null); setView("login"); setSb(window.innerWidth>=768); };

  const go = v => { setView(v); if (window.innerWidth < 768) setSb(false); };

  if (view==="login") return <Login onLogin={login}/>;
  if (view==="troca") return <TrocarSenha onSave={pwd=>{
    const upd = {...cu,password:pwd,firstLogin:false};
    setUsers(p=>p.map(u=>u.id===cu.id?upd:u));
    setCu(upd);
    LS.save("session", upd.id);
    const dest = upd.permissions.viewDash||upd.role==="admin" ? "dashboard" : upd.permissions.openTickets ? "newTicket" : "tickets";
    setView(dest);
    toast("✓ Senha alterada com sucesso!", "success");
  }}/>;

  return (
    <div style={{display:"flex",minHeight:"100vh",background:"#0d1117"}}>
      {sb && window.innerWidth<768 && <div onClick={()=>setSb(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:90}}/>}
      <Sidebar cu={cu} view={view} go={go} logout={logout} open={sb} can={can}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0,marginLeft:sb&&window.innerWidth>=768?220:0,transition:"margin .25s"}}>
        <Header cu={cu} toggle={()=>setSb(o=>!o)} nb={toasts.length}/>
        <main style={{flex:1,overflowY:"auto"}}>
          {view==="dashboard" && can("viewDash")    && <Dashboard tickets={tickets}/>}
          {view==="newTicket" && can("openTickets") && <NovoChamado cu={cu} users={users} onSubmit={tk=>{setTickets(p=>[tk,...p]);toast(`📧 Chamado ${tk.id} aberto! Notificações enviadas.`,"success");setView("tickets");}}/>}
          {view==="tickets"   && <Chamados
            tickets={can("viewAll")?tickets:tickets.filter(t=>t.operatorId===cu.id)}
            cu={cu} can={can} onView={setDetail}
            onDelete={id=>{setTickets(p=>p.filter(t=>t.id!==id));toast("🗑️ Chamado excluído.","info");}}
            onStatusChange={async(id,ns)=>{
              const tk=tickets.find(t=>t.id===id); if(!tk) return;
              setTickets(p=>p.map(t=>t.id===id?{...t,status:ns,updatedAt:new Date().toISOString(),history:[...t.history,{text:`Status → ${STATUS[ns]?.label}`,by:cu.name,at:new Date().toISOString()}]}:t));
              await notificarStatus(tk,ns,cu.name,users);
              toast(`📧 Status → ${STATUS[ns]?.label}`,"info");
            }}/>}
          {view==="reports" && can("viewReports") && <Relatorios tickets={tickets}/>}
          {view==="users"   && can("manageUsers") && <Usuarios users={users} cu={cu}
            onAdd={u=>{setUsers(p=>[...p,{...u,id:uid(),password:"123456",firstLogin:true}]);toast(`✓ Usuário ${u.name} criado!`,"success");}}
            onEdit={u=>{setUsers(p=>p.map(x=>x.id===u.id?u:x));toast("✓ Usuário atualizado!","success");}}
            onDelete={id=>{setUsers(p=>p.filter(x=>x.id!==id));toast("Usuário removido.","info");}}/>}
          {["dashboard","newTicket","reports","users"].includes(view) && (
            (view==="dashboard"&&!can("viewDash"))||(view==="newTicket"&&!can("openTickets"))||(view==="reports"&&!can("viewReports"))||(view==="users"&&!can("manageUsers"))
          ) && (
            <div style={{padding:40,textAlign:"center"}}>
              <p style={{fontSize:40,marginBottom:12}}>🔒</p>
              <p style={{fontFamily:"'Rajdhani'",fontWeight:700,fontSize:20,color:"#8b949e"}}>Acesso Restrito</p>
            </div>
          )}
        </main>
      </div>
      {detail && <Modal tk={detail} onClose={()=>setDetail(null)}/>}
      <Toasts items={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
